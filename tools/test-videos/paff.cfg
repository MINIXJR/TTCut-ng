# JM Reference Encoder PAFF config for tux test video
# Inherits defaults from cfg/encoder_main.cfg, overrides for PAFF synthesis

# Source dimensions
SourceWidth                = 1920
SourceHeight               = 1080
SourceResize               = 0

# Frame timing
FrameRate                  = 25.0
FramesToBeEncoded          = 3000
StartFrame                 = 0

# PAFF (picture-adaptive frame/field)
PicInterlace               = 1
MbInterlace                = 0

# GOP / B-frame structure
IntraPeriod                = 25
IDRPeriod                  = 1500
NumberBFrames              = 2
NumberReferenceFrames      = 2

# Profile / level
ProfileIDC                 = 100
LevelIDC                   = 41

# Output
OutputFile                 = tux_h264_1080i_paff_test.264

# Slice mode
SliceMode                  = 0

# Speed-up for test video generation: EPZS + reduced search range
# Full-search (SearchMode=0) at 1080p takes 45+ h for 3000 frames;
# EPZS (SearchMode=3) + SearchRange=8 cuts it to ~60 min.
SearchMode                 = 3
SearchRange                = 8
BiPredMESearchRange        = 4
EarlySkipEnable            = 1

# VUI emission so the SPS carries proper timing (libav otherwise reports
# the H.264 default time_scale=1.2M, forcing TTCut-ng's framerate fallback).
# For 25fps interlaced source: time_scale=50, num_units_in_tick=1 →
# 50 / (2 × 1) = 25fps display.
EnableVUISupport                                = 1
VUI_timing_info_present_flag                    = 1
VUI_num_units_in_tick                           = 1
VUI_time_scale                                  = 50
VUI_fixed_frame_rate_flag                       = 1
VUI_aspect_ratio_info_present_flag              = 1
VUI_aspect_ratio_idc                            = 1
